<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CODE:YOU | Redirecting...</title>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .loader { border: 4px solid #333; border-top: 4px solid #0f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="status">
    <div class="loader"></div>
    <p>読み込み中...</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAbprOKaVJO91Wi81oU4mATpnVzMdPUcds",
      authDomain: "codeyou-d.firebaseapp.com",
      projectId: "codeyou-d",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // URLの「?id=xxx」の部分を読み取る魔法の呪文
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    async function redirect() {
      const statusEl = document.getElementById('status');

      if (!id) {
        statusEl.innerHTML = "❌ IDが見つかりません。<br>QRコードを正しく読み取ってください。";
        return;
      }

      try {
        const doc = await db.collection('users').doc(id).get();
        if (doc.exists) {
          const targetUrl = doc.data().link;
          // URLが http から始まっていない場合の補正
          const finalUrl = targetUrl.startsWith('http') ? targetUrl : 'https://' + targetUrl;
          
          statusEl.innerHTML = "🚀 ジャンプします！";
          // 自動転送！
          window.location.href = finalUrl;
        } else {
          statusEl.innerHTML = "❌ 登録されていないIDです。";
        }
      } catch (error) {
        statusEl.innerHTML = "❌ 通信エラーが発生しました。";
        console.error(error);
      }
    }

    redirect();
  </script>
</body>
</html>
