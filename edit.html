<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CODE:YOU 編集ページ</title>
  <style>
    body {
      margin: 0; padding: 30px; background: #111; color: #fff;
      font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center;
    }
    .logo { font-size: 2em; margin-bottom: 20px; color: #0f0; }
    .box { display: flex; flex-direction: column; margin-bottom: 20px; }
    input { padding: 10px; margin: 5px; width: 250px; background: #222; color: #fff; border: 1px solid #555; }
    button {
      margin-top: 20px; padding: 15px 30px; background: #00f; color: #fff; border: none;
      font-weight: bold; cursor: pointer; border-radius: 5px;
    }
    #message { margin-top: 20px; text-align: center; line-height: 1.6; }
    #updateSection { display: none; border-top: 1px solid #444; pt: 20px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="logo">CODE:YOU EDIT</div>
  <p>情報を更新するには認証が必要です</p>

  <div class="box" id="authSection">
    <input type="text" id="idInput" placeholder="登録したID" />
    <input type="password" id="passInput" placeholder="パスワード" />
    <button id="authBtn">認証する</button>
  </div>

  <div class="box" id="updateSection">
    <p>新しいリンクを入力してください：</p>
    <input type="url" id="newUrlInput" placeholder="新しいURL (https://...)" />
    <button id="updateBtn" style="background: #f0f;">リンクを更新する</button>
  </div>

  <div id="message"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAbprOKaVJO91Wi81oU4mATpnVzMdPUcds",
      authDomain: "codeyou-d.firebaseapp.com",
      projectId: "codeyou-d",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentId = "";

    // 1. 認証処理
    document.getElementById('authBtn').addEventListener('click', async () => {
      const id = document.getElementById('idInput').value.trim();
      const pass = document.getElementById('passInput').value;
      const messageEl = document.getElementById('message');

      try {
        const doc = await db.collection('users').doc(id).get();
        if (doc.exists && doc.data().pass === pass) {
          messageEl.innerHTML = '<b style="color:#0f0;">✅ 認証成功！</b>';
          currentId = id;
          document.getElementById('authSection').style.display = 'none';
          document.getElementById('updateSection').style.display = 'flex';
          document.getElementById('newUrlInput').value = doc.data().link; // 今のURLを表示
        } else {
          messageEl.innerText = '❌ IDまたはパスワードが違います。';
        }
      } catch (error) {
        messageEl.innerText = '❌ エラー: ' + error.message;
      }
    });

    // 2. 更新処理
    document.getElementById('updateBtn').addEventListener('click', async () => {
      const newUrl = document.getElementById('newUrlInput').value.trim();
      const messageEl = document.getElementById('message');

      if (!newUrl) return;

      try {
        await db.collection('users').doc(currentId).update({
          link: newUrl,
          updatedAt: new Date()
        });
        messageEl.innerHTML = '<b style="color:#0f0;">✨ リンクを更新しました！</b>';
      } catch (error) {
        messageEl.innerText = '❌ 更新に失敗しました: ' + error.message;
      }
    });
  </script>
</body>
</html>
