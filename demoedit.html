<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE:YOU</title>
    <style>
        /* スマホ用アスペクト比固定のベース */
        :root {
            --bg-reg: #ffffff;
            --text-reg: #333333;
            --bg-edit: #1a1a1a;
            --text-edit: #ffffff;
            --accent: #565656;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.5s ease;
        }

        /* 登録ページ（白） */
        body.register-mode {
            background-color: var(--bg-reg);
            color: var(--text-reg);
        }

        /* 編集ページ（黒） */
        body.edit-mode {
            background-color: var(--bg-edit);
            color: var(--text-edit);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 50px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            background: transparent;
            color: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .edit-mode input {
            border-color: #444;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit {
            background-color: var(--accent);
            color: white;
        }

        /* モード切替用（開発中の確認用ボタン） */
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 5px;
            background: #eee;
            color: #333;
            cursor: pointer;
        }
    </style>
</head>
<body class="register-mode" id="mainBody">

    <div class="mode-toggle" onclick="toggleMode()">モード切替</div>

    <div class="container">
        <div class="logo">CODE:YOU</div>

        <div class="form-group">
            <input type="text" id="idInput" placeholder="ID">
        </div>
        <div class="form-group">
            <input type="text" id="linkInput" placeholder="Link">
        </div>
        <div class="form-group">
            <input type="password" id="passInput" placeholder="PASSWORD">
        </div>

        <button class="btn btn-submit" onclick="handleSubmit()">ENTER</button>
    </div>

    <script>
        function toggleMode() {
            const body = document.getElementById('mainBody');
            body.classList.toggle('register-mode');
            body.classList.toggle('edit-mode');
        }

        function handleSubmit() {
            const id = document.getElementById('idInput').value;
            const link = document.getElementById('linkInput').value;
            const pass = document.getElementById('passInput').value;

            // 判定ロジック（前回の内容）
            if (id && link && pass) {
                alert(`登録・保存しました！\nID: ${id}`);
            } else {
                alert("全部入力してね！");
            }
        }
    </script>
</body>
</html>
