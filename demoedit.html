<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE:YOU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="register-mode" id="mainBody">

    <div class="mode-toggle" onclick="toggleMode()">モード切替</div>

<div class="container">
    <div class="logo">CODE:YOU</div>

    <div class="form-group">
        <div id="idFieldset" class="custom-box">
            <input type="text" id="idInput" placeholder="ID">
        </div>
        <div id="idError" class="error-text hidden"></div>
    </div>

    <div class="form-group">
        <div id="linkFieldset" class="custom-box">
            <input type="text" id="linkInput" placeholder="Link">
        </div>
        <div id="linkError" class="error-text hidden"></div>
    </div>

<div class="form-group">
    <div id="passFieldset" class="custom-box">
        <div class="input-wrapper-left">
            <span id="togglePass" class="material-symbols-outlined eye-icon-left">visibility_off</span>
            <input type="password" id="passInput" placeholder="Password">
        </div>
    </div> <div id="passError" class="error-text hidden">英字、数字を含め８字以上で指定してください</div>
</div>

    <button class="btn btn-submit" onclick="handleSubmit()">ENTER</button>
</div>

    <script src="script.js"></script>
</body>
</html>
