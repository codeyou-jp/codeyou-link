<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CODE:YOU | Register</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; overflow: hidden; }
        #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

        /* くるくる回る渦の演出 */
        #swirl { 
            width: 180px; 
            cursor: pointer; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }
        #swirl:hover { transform: scale(1.05) rotate(10deg); }
        #swirl.active { transform: scale(0) rotate(720deg); opacity: 0; }

        /* 入力エリア（ふわっと出る） */
        .hidden { display: none !important; }
        #inputArea { 
            opacity: 0; 
            transform: translateY(20px); 
            transition: all 0.5s ease; 
        }
        #inputArea.show { opacity: 1; transform: translateY(0); }

        input {
            display: block; margin: 15px auto; padding: 12px; width: 250px;
            background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 5px;
            color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #0f0; background: rgba(255,255,255,0.2); }

        button {
            padding: 12px 30px; background: #fff; color: #000; border: none;
            border-radius: 25px; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 10px; letter-spacing: 2px;
        }
        button:hover { background: #0f0; transform: translateY(-2px); }

        /* 完成時のパズルアニメーション */
        #complete { 
            width: 280px; 
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="app">
    <img id="swirl" src="images/swirl_combo.png" alt="Start">

    <div id="inputArea" class="hidden">
        <h2 style="letter-spacing: 4px;">REGISTRATION</h2>
        <input id="idInputBlock" placeholder="希望のID">
        <input id="linkInputBlock" placeholder="飛ばしたいURL (https://...)">
        <input id="passInputBlock" type="password" placeholder="パスワード(8文字以上)">
        <button id="registerBtn">CONFIRM</button>
    </div>

    <img id="complete" src="images/puzzle_complete.png" class="hidden" alt="Success">
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAbprOKaVJO91Wi81oU4mATpnVzMdPUcds",
      authDomain: "codeyou-d.firebaseapp.com",
      projectId: "codeyou-d",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const swirl = document.getElementById("swirl");
    const inputArea = document.getElementById("inputArea");
    const complete = document.getElementById("complete");

    // 渦をクリックして入力欄を出す
    swirl.addEventListener("click", () => {
        swirl.classList.add("active");
        setTimeout(() => {
            swirl.classList.add("hidden");
            inputArea.classList.remove("hidden");
            setTimeout(() => inputArea.classList.add("show"), 50);
        }, 800);
    });

    // 登録処理
    document.getElementById("registerBtn").addEventListener("click", async () => {
        const id = document.getElementById("idInputBlock").value;
        const link = document.getElementById("linkInputBlock").value;
        const pass = document.getElementById("passInputBlock").value;

        if (id.length < 3 || pass.length < 8) {
            alert("IDは3文字以上、パスワードは8文字以上で入力してください");
            return;
        }

        try {
            // 重複チェック
            const docRef = db.collection('users').doc(id);
            const docSnap = await docRef.get();
            if (docSnap.exists) {
                alert("このIDは既に使用されています");
                return;
            }

            await docRef.set({ link, pass });

            // 演出：入力欄が消えてパズルが完成！
            inputArea.classList.remove("show");
            setTimeout(() => {
                inputArea.classList.add("hidden");
                complete.classList.remove("hidden");
            }, 500);

        } catch (e) {
            alert("エラーが発生しました");
            console.error(e);
        }
    });
</script>
</body>
</html>
